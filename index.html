<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Warung Salem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="min-h-screen">
        <!-- Header -->
        <div class="bg-zinc-900 border-b border-zinc-800">
            <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <div class="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center">
                        <i class="fa-solid fa-store text-white text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-2xl">Warung Salem</h1>
                        <p class="text-xs text-zinc-500">Point of Sale</p>
                    </div>
                </div>
                <div class="flex items-center gap-x-4">
                    <div class="px-4 py-1.5 bg-zinc-800 rounded-full text-sm flex items-center gap-x-2">
                        <i class="fa-solid fa-user text-emerald-400"></i>
                        <span id="admin-name">Admin</span>
                    </div>
                    <button onclick="logout()" 
                            class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-xl text-sm flex items-center gap-x-2 transition-colors">
                        <i class="fa-solid fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-6 py-8">
            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-zinc-900 rounded-2xl p-5 border border-zinc-800">
                    <div class="text-zinc-400 text-sm">Total Produk</div>
                    <div class="text-3xl font-bold mt-1" id="total-products">0</div>
                </div>
                <div class="bg-zinc-900 rounded-2xl p-5 border border-zinc-800">
                    <div class="text-zinc-400 text-sm">Transaksi Hari Ini</div>
                    <div class="text-3xl font-bold mt-1" id="today-transactions">0</div>
                </div>
                <div class="bg-zinc-900 rounded-2xl p-5 border border-zinc-800">
                    <div class="text-zinc-400 text-sm">Pendapatan Hari Ini</div>
                    <div class="text-3xl font-bold mt-1 text-emerald-400" id="today-revenue">Rp 0</div>
                </div>
                <div class="bg-zinc-900 rounded-2xl p-5 border border-zinc-800">
                    <div class="text-zinc-400 text-sm">Stok Menipis</div>
                    <div class="text-3xl font-bold mt-1 text-amber-400" id="low-stock">0</div>
                </div>
            </div>

            <!-- Main Content -->
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                
                <!-- Product List -->
                <div class="lg:col-span-5 bg-zinc-900 rounded-3xl border border-zinc-800 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-semibold text-lg">Daftar Produk</h2>
                        <button onclick="showAddProductModal()" 
                                class="px-4 py-2 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm flex items-center gap-x-2 transition-colors">
                            <i class="fa-solid fa-plus"></i>
                            <span>Tambah</span>
                        </button>
                    </div>
                    
                    <div class="mb-3">
                        <input type="text" id="search-product" placeholder="Cari produk..." 
                               class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 text-sm focus:outline-none focus:border-emerald-500"
                               onkeyup="filterProducts()">
                    </div>

                    <div id="product-list" class="space-y-2 max-h-[500px] overflow-auto pr-2">
                        <!-- Products will be loaded here -->
                    </div>
                </div>

                <!-- Cart -->
                <div class="lg:col-span-7 bg-zinc-900 rounded-3xl border border-zinc-800 p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-semibold text-lg">Keranjang</h2>
                        <button onclick="clearCart()" class="text-sm text-red-400 hover:text-red-500">Kosongkan</button>
                    </div>

                    <div id="cart-items" class="min-h-[300px] max-h-[400px] overflow-auto mb-4 space-y-3">
                        <!-- Cart items -->
                    </div>

                    <div class="border-t border-zinc-800 pt-4">
                        <div class="flex justify-between text-lg mb-1">
                            <span class="text-zinc-400">Total</span>
                            <span class="font-bold" id="cart-total">Rp 0</span>
                        </div>
                        
                        <div class="mt-4 grid grid-cols-2 gap-3">
                            <button onclick="checkout()" 
                                    class="col-span-2 py-4 bg-emerald-600 hover:bg-emerald-700 rounded-2xl font-semibold text-lg transition-colors">
                                <i class="fa-solid fa-check mr-2"></i> Bayar & Cetak Struk
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Product Modal -->
    <div id="add-product-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-md border border-zinc-800 p-6">
            <h3 class="font-semibold text-xl mb-4">Tambah Produk Baru</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-sm text-zinc-400">Nama Produk</label>
                    <input type="text" id="product-name" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm text-zinc-400">Harga</label>
                        <input type="number" id="product-price" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1">
                    </div>
                    <div>
                        <label class="text-sm text-zinc-400">Stok</label>
                        <input type="number" id="product-stock" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1">
                    </div>
                </div>
                <div>
                    <label class="text-sm text-zinc-400">Kategori</label>
                    <select id="product-category" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-4 py-3 mt-1">
                        <option value="Makanan">Makanan</option>
                        <option value="Minuman">Minuman</option>
                        <option value="Snack">Snack</option>
                        <option value="Lainnya">Lainnya</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-3 mt-6">
                <button onclick="hideAddProductModal()" class="flex-1 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl">Batal</button>
                <button onclick="addProduct()" class="flex-1 py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl">Simpan</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    
    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAnnCmMT3vV-7Qx9HR3ww1sZ7h_MVh6geo",
            authDomain: "pos-warung-salem.firebaseapp.com",
            projectId: "pos-warung-salem",
            storageBucket: "pos-warung-salem.firebasestorage.app",
            messagingSenderId: "85046866660",
            appId: "1:85046866660:web:39960723ef60b288db72f1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let cart = [];
        let products = [];

        // Load products
        function loadProducts() {
            db.collection("products").onSnapshot(snapshot => {
                products = [];
                snapshot.forEach(doc => {
                    products.push({ id: doc.id, ...doc.data() });
                });
                renderProducts();
                updateStats();
            });
        }

        function renderProducts(filteredProducts = null) {
            const container = document.getElementById('product-list');
            container.innerHTML = '';
            
            const list = filteredProducts || products;
            
            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-zinc-500">Belum ada produk</div>`;
                return;
            }

            list.forEach(product => {
                const div = document.createElement('div');
                div.className = `flex items-center justify-between p-4 bg-zinc-950 rounded-2xl border border-zinc-800 hover:border-emerald-600 cursor-pointer`;
                div.innerHTML = `
                    <div>
                        <div class="font-medium">${product.name}</div>
                        <div class="text-sm text-zinc-400">${product.category} • Stok: ${product.stock}</div>
                    </div>
                    <div class="text-right">
                        <div class="font-semibold">Rp ${product.price.toLocaleString()}</div>
                        <button onclick="event.stopImmediatePropagation(); addToCart('${product.id}');" 
                                class="mt-1 px-3 py-1 text-xs bg-emerald-600 rounded-xl">Tambah</button>
                    </div>
                `;
                div.onclick = () => addToCart(product.id);
                container.appendChild(div);
            });
        }

        function filterProducts() {
            const keyword = document.getElementById('search-product').value.toLowerCase();
            const filtered = products.filter(p => 
                p.name.toLowerCase().includes(keyword) || 
                p.category.toLowerCase().includes(keyword)
            );
            renderProducts(filtered);
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || product.stock <= 0) return alert('Stok habis!');

            const existing = cart.find(item => item.id === productId);
            if (existing) {
                if (existing.quantity >= product.stock) return alert('Stok tidak mencukupi');
                existing.quantity++;
            } else {
                cart.push({ ...product, quantity: 1 });
            }
            renderCart();
        }

        function renderCart() {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';

            if (cart.length === 0) {
                container.innerHTML = `<div class="text-center py-12 text-zinc-500">Keranjang kosong</div>`;
                document.getElementById('cart-total').innerText = 'Rp 0';
                return;
            }

            let total = 0;
            cart.forEach((item, index) => {
                total += item.price * item.quantity;
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between bg-zinc-950 p-3 rounded-2xl';
                div.innerHTML = `
                    <div>
                        <div class="font-medium">${item.name}</div>
                        <div class="text-xs text-zinc-400">Rp ${item.price.toLocaleString()} × ${item.quantity}</div>
                    </div>
                    <div class="flex items-center gap-x-3">
                        <div class="font-semibold">Rp ${(item.price * item.quantity).toLocaleString()}</div>
                        <button onclick="removeFromCart(${index})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });

            document.getElementById('cart-total').innerText = `Rp ${total.toLocaleString()}`;
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderCart();
        }

        function clearCart() {
            cart = [];
            renderCart();
        }

        async function checkout() {
            if (cart.length === 0) return;

            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            
            const transaction = {
                date: new Date(),
                items: cart,
                total: total,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            try {
                await db.collection("transactions").add(transaction);
                
                // Update stock
                for (let item of cart) {
                    await db.collection("products").doc(item.id).update({
                        stock: firebase.firestore.FieldValue.increment(-item.quantity)
                    });
                }

                alert(`Transaksi berhasil!\nTotal: Rp ${total.toLocaleString()}`);
                cart = [];
                renderCart();
            } catch (error) {
                console.error(error);
                alert('Gagal menyimpan transaksi');
            }
        }

        function updateStats() {
            document.getElementById('total-products').innerText = products.length;
            
            const lowStock = products.filter(p => p.stock < 5).length;
            document.getElementById('low-stock').innerText = lowStock;
        }

        function showAddProductModal() {
            document.getElementById('add-product-modal').classList.remove('hidden');
        }

        function hideAddProductModal() {
            document.getElementById('add-product-modal').classList.add('hidden');
        }

        async function addProduct() {
            const name = document.getElementById('product-name').value;
            const price = parseInt(document.getElementById('product-price').value);
            const stock = parseInt(document.getElementById('product-stock').value);
            const category = document.getElementById('product-category').value;

            if (!name || !price) return alert('Nama dan harga wajib diisi');

            try {
                await db.collection("products").add({
                    name, price, stock, category,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                hideAddProductModal();
                document.getElementById('product-name').value = '';
                document.getElementById('product-price').value = '';
                document.getElementById('product-stock').value = '';
            } catch (error) {
                alert('Gagal menambah produk');
            }
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.reload();
            });
        }

        // Initialize
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('admin-name').innerText = user.email || 'Admin';
                loadProducts();
            } else {
                // Redirect to login page (akan dibuat nanti)
                alert('Silakan login terlebih dahulu');
            }
        });
    </script>
</body>
</html>
