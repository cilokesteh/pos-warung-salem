<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan - POS Warung Salem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-200">
    <div class="max-w-6xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold">Laporan Penjualan</h1>
                <p class="text-zinc-400">POS Warung Salem</p>
            </div>
            <a href="index.html" class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl flex items-center gap-x-2">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Kembali ke Kasir</span>
            </a>
        </div>

        <!-- Filter -->
        <div class="bg-zinc-900 rounded-3xl border border-zinc-800 p-6 mb-6">
            <div class="flex flex-wrap gap-3">
                <button onclick="loadReport('daily')" class="px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm font-medium">Hari Ini</button>
                <button onclick="loadReport('weekly')" class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">7 Hari Terakhir</button>
                <button onclick="loadReport('monthly')" class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">Bulan Ini</button>
                <button onclick="loadReport('yearly')" class="px-5 py-2.5 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">Tahun Ini</button>
            </div>
        </div>

        <!-- Summary -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="bg-zinc-900 rounded-3xl border border-zinc-800 p-6">
                <div class="text-zinc-400 text-sm">Total Transaksi</div>
                <div class="text-4xl font-bold mt-2" id="total-transactions">0</div>
            </div>
            <div class="bg-zinc-900 rounded-3xl border border-zinc-800 p-6">
                <div class="text-zinc-400 text-sm">Total Pendapatan</div>
                <div class="text-4xl font-bold mt-2 text-emerald-400" id="total-revenue">Rp 0</div>
            </div>
            <div class="bg-zinc-900 rounded-3xl border border-zinc-800 p-6">
                <div class="text-zinc-400 text-sm">Rata-rata per Transaksi</div>
                <div class="text-4xl font-bold mt-2" id="avg-transaction">Rp 0</div>
            </div>
        </div>

        <!-- Transactions Table -->
        <div class="bg-zinc-900 rounded-3xl border border-zinc-800 p-6">
            <h3 class="font-semibold text-lg mb-4">Daftar Transaksi</h3>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-zinc-800 text-left text-sm text-zinc-400">
                            <th class="py-3 px-4">Tanggal</th>
                            <th class="py-3 px-4">Item</th>
                            <th class="py-3 px-4 text-right">Total</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-table" class="text-sm">
                        <!-- Data will be loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAnnCmMT3vV-7Qx9HR3ww1sZ7h_MVh6geo",
            authDomain: "pos-warung-salem.firebaseapp.com",
            projectId: "pos-warung-salem",
            storageBucket: "pos-warung-salem.firebasestorage.app",
            messagingSenderId: "85046866660",
            appId: "1:85046866660:web:39960723ef60b288db72f1"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'login.html';
            }
        });

        function loadReport(type) {
            let startDate = new Date();
            let endDate = new Date();

            if (type === 'daily') {
                startDate.setHours(0, 0, 0, 0);
            } else if (type === 'weekly') {
                startDate.setDate(startDate.getDate() - 7);
            } else if (type === 'monthly') {
                startDate.setDate(1);
            } else if (type === 'yearly') {
                startDate = new Date(startDate.getFullYear(), 0, 1);
            }

            db.collection("transactions")
                .where("createdAt", ">=", startDate)
                .orderBy("createdAt", "desc")
                .get()
                .then(snapshot => {
                    let total = 0;
                    let count = 0;
                    let html = '';

                    snapshot.forEach(doc => {
                        const data = doc.data();
                        total += data.total;
                        count++;

                        const date = data.createdAt ? data.createdAt.toDate() : new Date();
                        const dateStr = date.toLocaleDateString('id-ID');

                        html += `
                            <tr class="border-b border-zinc-800">
                                <td class="py-4 px-4">${dateStr}</td>
                                <td class="py-4 px-4">${data.items.length} item</td>
                                <td class="py-4 px-4 text-right font-semibold">Rp ${data.total.toLocaleString()}</td>
                            </tr>
                        `;
                    });

                    document.getElementById('transactions-table').innerHTML = html || '<tr><td colspan="3" class="py-8 text-center text-zinc-500">Tidak ada transaksi</td></tr>';
                    document.getElementById('total-transactions').innerText = count;
                    document.getElementById('total-revenue').innerText = `Rp ${total.toLocaleString()}`;
                    document.getElementById('avg-transaction').innerText = count > 0 ? `Rp ${Math.round(total / count).toLocaleString()}` : 'Rp 0';
                });
        }

        // Load daily report by default
        window.onload = () => {
            loadReport('daily');
        }
    </script>
</body>
</html>
